form_name_rules:
  strategy: largest_bold_text
  min_font_size: 6.5
  exclude_patterns:
  - ^CDISC$
  - ^Study\b
  - '^Design\s*:'
  - '^Codelist\s*:'
  - \S+\s*:\s*$
  - ^Assessment Date
  - \bPage\s+\d+\s+of\s+\d+\b
  - ^\[\d{6}
  - \b\d{1,2}/\d{1,2}/\d{4}\s+\d{1,2}:\d{2}:\d{2}\b
  - \b(January|February|March|April|May|June|July|August|September|October|November|December)\s+\d{1,2},\s+\d{4}\b
  top_region_fraction: 0.35
  label_prefix: null
visit_rules:
- regex: Screen(ing)?
  value: Screening
- regex: Baseline
  value: Baseline
- regex: Week\s*(\d+)
  value: Week {1}
- regex: End of Study|Termination
  value: End of Study
- regex: Running\s*Records?
  value: Running Records
anchor_text_config:
  radius_px: 100.0
  prefer_direction:
  - left
  - above
  exclude_patterns:
  - ^\s*$
  - ^CDISC$
  - ^Study\b
  - '^Design\s*:'
  - '^Codelist\s*:'
  - \S+\s*:\s*$
  - ^Assessment Date
  - \bPage\s+\d+\s+of\s+\d+\b
  - ^\[\d{6}
  - \b\d{1,2}/\d{1,2}/\d{4}\s+\d{1,2}:\d{2}:\d{2}\b
  - \b(January|February|March|April|May|June|July|August|September|October|November|December)\s+\d{1,2},\s+\d{4}\b
  left_column_tolerance_px: 50.0
annotation_filter:
  include_types:
  - FreeText
  exclude_empty: true
  min_content_length: 1
matching_config:
  exact_threshold: 1.0
  fuzzy_same_form_threshold: 0.8
  fuzzy_cross_form_threshold: 0.9
  position_fallback_confidence: 0.5
  visit_boost: 5.0
style_defaults:
  font: Arial,BoldItalic
  font_size: 18.0
  text_color:
  - 0.0
  - 0.0
  - 0.0
  border_color:
  - 0.75
  - 1.0
  - 1.0
  fill_color: null
